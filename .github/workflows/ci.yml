name: Fullstack Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  exp20-backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Exp-20/Backend

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pytest -v

  exp20-frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Exp-20/Frontend

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Exp-20/Frontend/package-lock.json

      - run: npm ci
      - run: npm run test
